<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buysimply login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container_login">
    <header>
        <div class="header_logo">
        <img src="img/logo.png" alt="logo">
        </div>
    </header>
 
    <form action="">
        <div class="input">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
        </div>
        <div class="signup">
           <span class="input_signup">Don't have an account yet? <a class="sign_up" href="#">Sign Up</a></span>
           <a class="recover" href="#">Recover Password</a>
        </div>
        <div class="login">
            <button><a class="log_in" href="#">Login</a></button>
            <p class="login_demo">New here? <a class="demo" href="#">Request demo</a></p>
        </div>
    </form>
    </div>

</body>
</html
